<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF6FF"/>
      <stop offset="100%" stop-color="#F0E8FF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#C589E8"/>
      <stop offset="100%" stop-color="#8FA3FF"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo1" cx="15%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#FFC4D6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFC4D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#C4D6FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C4D6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo3" cx="60%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8D6FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E8D6FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 (은은한 글로우) -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo1)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>
  <rect width="1200" height="630" fill="url(#halo3)"/>

  <!-- 돋보기 (그라디언트로 채워짐) -->
  <g transform="translate(360, 315)" filter="url(#softGlow)">
    <line x1="78" y1="78" x2="148" y2="148"
          stroke="url(#brand)" stroke-width="30" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="115" fill="url(#brand)"/>
    <circle cx="0" cy="0" r="115" fill="url(#lensGlow)"/>
  </g>

  <!-- QLINK — 가벼운 두께, 돋보기와 가까이 -->
  <text x="555" y="365"
        font-family="Outfit, system-ui, -apple-system, sans-serif"
        font-size="184"
        font-weight="500"
        letter-spacing="-2"
        fill="url(#brand)">QLINK</text>

  <!-- 작은 sparkle (신비주의 느낌) -->
  <g opacity="0.9">
    <text x="280" y="200" font-size="22" fill="#C589E8">✦</text>
    <text x="1080" y="180" font-size="18" fill="#FF6B9D">✦</text>
    <text x="900" y="500" font-size="16" fill="#8FA3FF">✦</text>
    <text x="220" y="510" font-size="14" fill="#C589E8">✦</text>
  </g>
</svg>
