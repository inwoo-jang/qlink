<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF6FF"/>
      <stop offset="100%" stop-color="#F0E8FF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#C589E8"/>
      <stop offset="100%" stop-color="#8FA3FF"/>
    </linearGradient>
    <radialGradient id="halo1" cx="20%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#FFC4D6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFC4D6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#C4D6FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C4D6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo1)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <g opacity="0.85">
    <text x="100" y="160" font-size="20" fill="#C589E8">✦</text>
    <text x="1080" y="180" font-size="16" fill="#FF6B9D">✦</text>
    <text x="1090" y="500" font-size="22" fill="#8FA3FF">✦</text>
    <text x="120" y="510" font-size="14" fill="#C589E8">✦</text>
  </g>

  <g transform="translate(0, -10)">
    <image x="220" y="195" width="240" height="240" xlink:href="icon-search.png" preserveAspectRatio="xMidYMid meet"/>
    <text x="495" y="370"
          font-family="Outfit, system-ui, -apple-system, sans-serif"
          font-size="160"
          font-weight="900"
          letter-spacing="6"
          fill="url(#brand)">QLINK</text>
  </g>
</svg>
