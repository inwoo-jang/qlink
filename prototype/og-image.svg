<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5FA"/>
      <stop offset="100%" stop-color="#F5EAFF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="50%" stop-color="#C589E8"/>
      <stop offset="100%" stop-color="#8FA3FF"/>
    </linearGradient>
    <linearGradient id="brandLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity=".75"/>
    </linearGradient>
    <radialGradient id="halo1" cx="20%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FFD6E8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFD6E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#E0CCFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E0CCFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo1)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <!-- 좌측: 돋보기 (그라데이션 라인) -->
  <g transform="translate(280, 315)">
    <!-- 손잡이 -->
    <line x1="80" y1="80" x2="160" y2="160" stroke="url(#brand)" stroke-width="36" stroke-linecap="round"/>
    <!-- 원형 -->
    <circle cx="0" cy="0" r="115" fill="white" stroke="url(#brand)" stroke-width="36"/>
    <!-- 렌즈 반사 -->
    <ellipse cx="-30" cy="-40" rx="40" ry="22" fill="white" opacity="0.7"/>
  </g>

  <!-- 우측: QLINK 텍스트 (그라데이션) -->
  <text x="510" y="380"
        font-family="Outfit, system-ui, -apple-system, sans-serif"
        font-size="200"
        font-weight="900"
        letter-spacing="6"
        fill="url(#brand)">QLINK</text>

  <!-- 작은 점들 -->
  <circle cx="1080" cy="120" r="14" fill="#FFE066"/>
  <circle cx="170" cy="510" r="10" fill="#FFC4D6"/>
  <circle cx="1100" cy="510" r="8" fill="#C589E8" opacity="0.7"/>

  <!-- 우측 상단 작은 ✨ -->
  <text x="1010" y="180"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="48">✨</text>

  <!-- 하단 태그라인 -->
  <text x="600" y="490"
        font-family="-apple-system, system-ui, 'Apple SD Gothic Neo', 'Pretendard', sans-serif"
        font-size="32"
        font-weight="700"
        text-anchor="middle"
        fill="#9B6E84">링크와 QR을 AI가 정리해주는 스마트 북마크</text>
</svg>
